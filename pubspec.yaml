name: polly_flutter
description: >-
  Flutter-first resilience widgets built on polly_dart. Provides drop-in
  replacements for FutureBuilder, StreamBuilder, network images, buttons,
  forms, and lists — all with automatic retry, circuit breaker, caching,
  rate limiting, and connectivity awareness baked in.
version: 0.0.1
homepage: https://anirudhsingh.in
repository: https://github.com/flutterninja9/polly_flutter
issue_tracker: https://github.com/flutterninja9/polly_flutter/issues
documentation: https://anirudhsingh.in/polly_flutter

environment:
  sdk: ^3.10.4
  flutter: ">=3.10.0"

dependencies:
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  flutter:
    sdk: flutter
  polly_dart: ^0.0.7
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.3

publisher: anirudhsingh.in

topics:
  - resilience
  - retry
  - circuit-breaker
  - networking
  - widgets

flutter:
